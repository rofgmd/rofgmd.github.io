    <header class="site-header">

    <main>
      <article class="article">
        <p class="eyebrow">Travel Template</p>
        <h1>旅行记录模板</h1>
        <p class="article-lead">用于整理路线、城市印象、照片线索和下次还想补完的地方。</p>

        <h2>路线</h2>
        <p>城市、日期、交通、住宿和每天的大致安排。</p>

        <h2>印象</h2>
        <p>这座城市给你的第一感觉、最喜欢的地方、意外发现和不推荐事项。</p>

        <h2>照片线索</h2>
        <p>记录哪些照片可以放进文章，后续可以慢慢补图。</p>

        <h2>下次再来</h2>
        <p>还有什么没去、没吃、没看，或者想用另一种方式重新体验。</p>
      </article>
    </main>
    <script src="../../theme.js"></script>
