      <article class="article">
        <p class="eyebrow">Project Template</p>
        <h1>SRE 项目总结模板</h1>
        <p class="article-lead">
          用于整理稳定性优化、自动化建设、监控治理、发布流程改造等项目。
        </p>

        <h2>背景</h2>
        <p>为什么要做这个项目？当时的痛点、风险或机会是什么？</p>

        <h2>目标</h2>
        <ul>
          <li>目标指标：</li>
          <li>非目标：</li>
          <li>约束条件：</li>
        </ul>

        <h2>方案</h2>
        <p>说明核心设计、技术选型、权衡和替代方案。</p>

        <h2>执行过程</h2>
        <p>记录关键步骤、协作方式、遇到的问题和解决路径。</p>

        <h2>结果</h2>
        <p>尽量用数字表达，例如 MTTR、告警数量、发布耗时、误报率、人工操作次数。</p>

        <h2>复盘</h2>
        <p>这个项目带来了什么长期收益？如果重做，哪些地方会调整？</p>
      </article>
    </main>
